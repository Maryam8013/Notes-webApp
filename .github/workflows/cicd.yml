name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  frontend-ci:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notes-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: notes-frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend-ci:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notes-backend
    env:
      APP_ENV: testing
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_DATABASE: notes_db
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: notes_db
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo_mysql, zip
          tools: composer:v2
      - run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - run: cp .env.example .env && php artisan key:generate --force
      - run: php artisan migrate --force
      - run: php artisan test

  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        run: |
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LOWER=${OWNER_LOWER}" >> $GITHUB_ENV
          echo "BACKEND_IMAGE=ghcr.io/${OWNER_LOWER}/notes-backend:sha-${GITHUB_SHA}" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${OWNER_LOWER}/notes-frontend:sha-${GITHUB_SHA}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./notes-backend
          file: ./notes-backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./notes-frontend
          file: ./notes-frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_REPOSITORY_OWNER,GITHUB_SHA,APP_KEY,JWT_SECRET
          script: |
            set -e
            OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
            export BACKEND_IMAGE="ghcr.io/${OWNER_LOWER}/notes-backend:sha-${GITHUB_SHA}"
            export FRONTEND_IMAGE="ghcr.io/${OWNER_LOWER}/notes-frontend:sha-${GITHUB_SHA}"

            cd ~

            # Update image tags in docker-compose.yml
            sed -i "s#ghcr.io/.*/notes-backend:sha-[a-f0-9]\{40\}#${BACKEND_IMAGE}#g" docker-compose.yml
            sed -i "s#ghcr.io/.*/notes-frontend:sha-[a-f0-9]\{40\}#${FRONTEND_IMAGE}#g" docker-compose.yml

            # Write APP_KEY to .env file
            echo "APP_KEY=${APP_KEY}" > ~/.env
            echo "JWT_SECRET=${JWT_SECRET}" >> ~/.env

            # Pull new images and restart
            docker-compose pull backend frontend
            docker-compose up -d --remove-orphans

            # Cleanup old images to save disk space
            docker image prune -af
