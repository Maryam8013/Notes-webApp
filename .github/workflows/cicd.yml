name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  frontend-ci:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notes-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: notes-frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend-ci:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notes-backend
    env:
      APP_ENV: testing
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_DATABASE: notes_db
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: notes_db
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo_mysql, zip
          tools: composer:v2
      - run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - run: cp .env.example .env && php artisan key:generate --force
      - run: php artisan migrate --force
      - run: php artisan test

  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        run: |
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LOWER=${OWNER_LOWER}" >> $GITHUB_ENV
          echo "BACKEND_IMAGE=ghcr.io/${OWNER_LOWER}/notes-backend:sha-${GITHUB_SHA}" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${OWNER_LOWER}/notes-frontend:sha-${GITHUB_SHA}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve production URLs
        run: |
          API_BASE_URL="${{ secrets.PROD_API_BASE_URL }}"
          if [ -z "$API_BASE_URL" ]; then
            API_BASE_URL="http://${{ secrets.EC2_HOST }}:8000/api"
          fi

          FRONTEND_URL="${{ secrets.PROD_FRONTEND_URL }}"
          if [ -z "$FRONTEND_URL" ]; then
            FRONTEND_URL="http://${{ secrets.EC2_HOST }}:5173"
          fi

          APP_URL="${API_BASE_URL%/}"
          APP_URL="${APP_URL%/api}"

          echo "API_BASE_URL=${API_BASE_URL}" >> $GITHUB_ENV
          echo "FRONTEND_URL=${FRONTEND_URL}" >> $GITHUB_ENV
          echo "APP_URL=${APP_URL}" >> $GITHUB_ENV

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./notes-backend
          file: ./notes-backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./notes-frontend
          file: ./notes-frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}
          build-args: |
            VITE_API_BASE_URL=${{ env.API_BASE_URL }}

      - name: Setup Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Prepare SSH key
        run: |
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ec2_key.pem
          chmod 600 ec2_key.pem

      - name: Preflight SSH connectivity
        run: |
          set -euo pipefail
          HOST="${{ secrets.EC2_HOST }}"
          USER="${{ secrets.EC2_USER }}"
          echo "Checking SSH reachability for ${USER}@${HOST}:22"

          for i in {1..30}; do
            if timeout 3 bash -c "cat < /dev/null > /dev/tcp/${HOST}/22" 2>/dev/null; then
              echo "Port 22 is reachable on ${HOST}"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "EC2 host is not reachable on port 22."
              echo "If you recently recreated EC2 via Terraform, update GitHub secret EC2_HOST to the latest terraform output public_ip."
              exit 1
            fi
            sleep 5
          done

      - name: Deploy on EC2 with Ansible
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ANSIBLE_CONFIG: ansible/ansible.cfg
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_SSH_ARGS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        run: |
          set -e
          python - <<'PY'
          import json, os
          payload = {
              "backend_image": os.environ["BACKEND_IMAGE"],
              "frontend_image": os.environ["FRONTEND_IMAGE"],
              "app_key": os.environ["APP_KEY"],
              "jwt_secret": os.environ["JWT_SECRET"],
              "app_url": os.environ["APP_URL"],
              "frontend_url": os.environ["FRONTEND_URL"],
              "deploy_dir": "~/notes-app",
          }
          with open("deploy-vars.json", "w", encoding="utf-8") as f:
              json.dump(payload, f)
          PY

          ansible-playbook \
            -i "${{ secrets.EC2_HOST }}," \
            -u "${{ secrets.EC2_USER }}" \
            --private-key ec2_key.pem \
            ansible/deploy.yml \
            -e @deploy-vars.json

          rm -f ec2_key.pem deploy-vars.json
