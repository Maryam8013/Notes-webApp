name: Deploy to EC2

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: vars
        run: |
          echo "TAG=sha-${GITHUB_SHA}" >> $GITHUB_ENV
          echo "BACKEND_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER}/notes-backend:sha-${GITHUB_SHA}" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER}/notes-frontend:sha-${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./notes-backend
          file: ./notes-backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./notes-frontend
          file: ./notes-frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_REPOSITORY_OWNER,GITHUB_SHA
          script: |
            set -e
            export TAG="sha-${GITHUB_SHA}"
            export BACKEND_IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/notes-backend:${TAG}"
            export FRONTEND_IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/notes-frontend:${TAG}"

            docker login ghcr.io -u "${GITHUB_REPOSITORY_OWNER}" -p "${GITHUB_TOKEN}"

            cd ~
            if [ ! -f docker-compose.yml ]; then
              echo "docker-compose.yml not found in home directory"
              exit 1
            fi

            sed -i "s#ghcr.io/.*/notes-backend:sha-[a-f0-9]\\{40\\}#${BACKEND_IMAGE}#g" docker-compose.yml
            sed -i "s#ghcr.io/.*/notes-frontend:sha-[a-f0-9]\\{40\\}#${FRONTEND_IMAGE}#g" docker-compose.yml

            docker compose pull
            docker compose up -d
