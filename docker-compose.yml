version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: notes-mysql
    environment:
      MYSQL_DATABASE: notes_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    image: ghcr.io/maryamirfan123/notes-backend:sha-0000000000000000000000000000000000000000 # ✅ replaced build with image
    container_name: notes-backend
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://backend:8000
      FRONTEND_URL: http://frontend:5173
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: notes_db
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: ghcr.io/maryamirfan123/notes-frontend:sha-0000000000000000000000000000000000000000 # ✅ replaced build with image
    container_name: notes-frontend
    environment:
      VITE_API_BASE_URL: http://backend:8000/api
    depends_on:
      - backend
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  mysql_data:
