[defaults]
host_key_checking = False
retry_files_enabled = False
stdout_callback = ansible.builtin.default
result_format = yaml
inventory = ./inventory.ini

[ssh_connection]
pipelining = True
retries = 5
ssh_args = -o ControlMaster=auto -o ControlPersist=120s -o ServerAliveInterval=20 -o ServerAliveCountMax=6 -o ConnectTimeout=15 -o ConnectionAttempts=3 -o TCPKeepAlive=yes
