[defaults]
host_key_checking = False
retry_files_enabled = False
stdout_callback = ansible.builtin.default
result_format = yaml
inventory = ./inventory.ini

[ssh_connection]
pipelining = True
retries = 10
ssh_args = -o ControlMaster=auto -o ControlPersist=120s -o ServerAliveInterval=20 -o ServerAliveCountMax=6 -o ConnectTimeout=30 -o ConnectionAttempts=10 -o TCPKeepAlive=yes -o PreferredAuthentications=publickey -o IdentitiesOnly=yes
