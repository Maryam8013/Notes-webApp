---
- name: Deploy Notes stack with Docker Compose
  hosts: all
  gather_facts: false

  vars:
    deploy_dir: "{{ deploy_dir | default('~/notes-app') }}"

  pre_tasks:
    - name: Wait for SSH port to be reachable
      ansible.builtin.wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: 22
        state: started
        delay: 5
        sleep: 5
        timeout: 420
      delegate_to: localhost

    - name: Wait for Ansible SSH connection
      ansible.builtin.wait_for_connection:
        delay: 5
        sleep: 5
        timeout: 90

  tasks:
    - name: Validate required deployment vars
      ansible.builtin.assert:
        that:
          - backend_image is defined
          - frontend_image is defined
          - app_key is defined
          - jwt_secret is defined
          - app_url is defined
          - frontend_url is defined
        fail_msg: "Missing required deploy vars. Required: backend_image, frontend_image, app_key, jwt_secret, app_url, frontend_url"

    - name: Ensure deployment directory exists
      ansible.builtin.file:
        path: "{{ deploy_dir }}"
        state: directory
        mode: "0755"

    - name: Refresh SSH connection before template copy
      ansible.builtin.meta: reset_connection

    - name: Re-verify Ansible SSH connection
      ansible.builtin.wait_for_connection:
        delay: 2
        sleep: 3
        timeout: 60

    - name: Render docker-compose.yml
      ansible.builtin.template:
        src: templates/docker-compose.yml.j2
        dest: "{{ deploy_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Render runtime .env
      ansible.builtin.template:
        src: templates/runtime.env.j2
        dest: "{{ deploy_dir }}/.env"
        mode: "0600"

    - name: Check if Docker Compose is already available
      ansible.builtin.shell: |
        if docker compose version >/dev/null 2>&1 || docker-compose version >/dev/null 2>&1; then
          echo "present"
        elif [ -x /usr/libexec/docker/cli-plugins/docker-compose ] || [ -x /usr/lib/docker/cli-plugins/docker-compose ]; then
          echo "present"
        else
          echo "missing"
        fi
      register: compose_presence
      changed_when: false

    - name: Ensure Docker engine is installed
      become: true
      ansible.builtin.apt:
        update_cache: true
        name: docker.io
        state: present

    - name: Ensure Docker service is running
      become: true
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Install Docker Compose from distro packages when missing
      become: true
      ansible.builtin.shell: |
        set -e
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -y
        for pkg in docker-compose-plugin docker-compose-v2 docker-compose; do
          if apt-get install -y "$pkg"; then
            echo "installed:$pkg"
            exit 0
          fi
        done
        exit 1
      args:
        executable: /bin/bash
      when: compose_presence.stdout == "missing"
      register: compose_install_attempt
      changed_when: "'installed:' in compose_install_attempt.stdout"
      failed_when: false

    - name: Detect available Compose command
      ansible.builtin.shell: |
        if docker compose version >/dev/null 2>&1; then
          echo "docker compose"
        elif docker-compose version >/dev/null 2>&1; then
          echo "docker-compose"
        elif [ -x /usr/libexec/docker/cli-plugins/docker-compose ]; then
          echo "/usr/libexec/docker/cli-plugins/docker-compose"
        elif [ -x /usr/lib/docker/cli-plugins/docker-compose ]; then
          echo "/usr/lib/docker/cli-plugins/docker-compose"
        else
          echo "NO_COMPOSE"
          exit 1
        fi
      register: compose_cmd
      changed_when: false

    - name: Pull backend/frontend images
      ansible.builtin.shell: "{{ compose_cmd.stdout }} pull backend frontend"
      args:
        chdir: "{{ deploy_dir }}"

    - name: Remove existing named containers to avoid name conflicts
      ansible.builtin.shell: |
        for c in notes-mysql notes-backend notes-frontend; do
          docker rm -f "$c" >/dev/null 2>&1 || true
        done
      changed_when: true

    - name: Restart stack
      ansible.builtin.shell: "{{ compose_cmd.stdout }} up -d --remove-orphans"
      args:
        chdir: "{{ deploy_dir }}"

    - name: Prune unused images
      ansible.builtin.command: docker image prune -af
      changed_when: true
