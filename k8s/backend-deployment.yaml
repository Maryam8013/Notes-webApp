apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: notes-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/maryamirfan123/notes-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: notes-config
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: notes-secrets
                  key: APP_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: notes-secrets
                  key: JWT_SECRET
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notes-secrets
                  key: MYSQL_ROOT_PASSWORD
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
